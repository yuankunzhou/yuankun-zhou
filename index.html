<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuankun Zhou</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    font-size: 20px;
    line-height: 1.8;
    color: #111;
    background: #fff;
    max-width: 700px;
    margin: 0 auto;
    padding: 80px 24px 120px;
  }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; }
  .header-left { flex: 1; }
  h1 { font-size: 23px; font-weight: normal; color: #111; margin: 0 0 4px; }
  .zh { font-size: 18px; color: #999; }
  .roles { font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; margin-top: 11px; margin-bottom: 21px; }
  .about-text { font-size: 15px; color: #444; line-height: 1.8; max-width: 480px; }
  .profile-pic { width: 112px; height: 144px; object-fit: cover; flex-shrink: 0; margin-left: 32px; background: #eee; display: block; }
  nav { border-bottom: 1px solid #ddd; margin-bottom: 36px; display: flex; gap: 24px; }
  nav button { background: none; border: none; border-bottom: 1px solid transparent; margin-bottom: -1px; padding: 8px 0; font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; cursor: pointer; }
  nav button:hover { color: #111; }
  nav button.active { color: #111; border-bottom-color: #111; }
  .panel { display: none; }
  .panel.active { display: block; }
  .label { font-family: Helvetica, Arial, sans-serif; font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-top: 37px; margin-bottom: 21px; }
  .label:first-child { margin-top: 0; }
  .entry { margin-bottom: 29px; }
  .entry-meta { font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; margin-bottom: 8px; }
  .entry-title { font-style: italic; font-size: 20px; color: #111; margin-bottom: 8px; }
  .entry-desc { font-size: 19px; color: #444; line-height: 1.8; }
  .proj-nav { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 32px; border-bottom: 1px solid #f0f0f0; padding-bottom: 16px; }
  .proj-nav button { background: none; border: none; font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; cursor: pointer; padding: 0; }
  .proj-nav button.active { color: #111; border-bottom: 1px solid #111; padding-bottom: 2px; }
  .proj-panel { display: none; }
  .proj-panel.active { display: block; }
  .proj-entry { margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid #f0f0f0; }
  .proj-entry:last-child { border-bottom: none; }
  .proj-year { font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; margin-bottom: 8px; }
  .proj-title { font-style: italic; font-size: 20px; color: #111; margin-bottom: 12px; }
  .proj-images { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .proj-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #f0f0f0; display: block; }
  .proj-image-single { width: 100%; max-height: 400px; object-fit: cover; background: #f0f0f0; display: block; margin-bottom: 12px; }
  .proj-desc { font-size: 19px; color: #444; line-height: 1.8; margin-bottom: 16px; }
  .proj-big-desc { font-size: 19px; color: #444; line-height: 1.8; margin-bottom: 37px; }
  .download-link { font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #111; text-decoration: none; border-bottom: 1px solid #111; padding-bottom: 1px; }
  .wall-meta { font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; margin-bottom: 8px; }
  .blog-entry { margin-bottom: 29px; padding-bottom: 29px; border-bottom: 1px solid #f0f0f0; }
  .blog-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .blog-title { font-style: italic; font-size: 20px; color: #111; }
  .blog-date { font-family: Helvetica, Arial, sans-serif; font-size: 17px; color: #999; white-space: nowrap; margin-left: 16px; }
  .blog-content { font-size: 19px; color: #444; line-height: 1.8; }
  .cv-preview { width: 100%; height: 500px; border: none; background: #f8f8f8; display: block; margin-bottom: 21px; }
  .contact-block { margin-bottom: 29px; }
  .contact-label { font-family: Helvetica, Arial, sans-serif; font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 11px; }
  .contact-value { font-size: 19px; color: #444; line-height: 1.8; }
  .contact-link { font-size: 19px; color: #111; text-decoration: none; border-bottom: 1px solid #111; padding-bottom: 1px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Yuankun Zhou <span class="zh">周元坤</span></h1>
    <p class="roles">Artist · Dramaturg · Playwright · Researcher</p>
    <div class="about-text">[About description]</div>
  </div>
  <img class="profile-pic" id="profile-img" src="" alt="Yuankun Zhou" />
</div>

<nav>
  <button class="active" onclick="showTab('scripts',this)">Scripts</button>
  <button onclick="showTab('projects',this)">Projects</button>
  <button onclick="showTab('blog',this)">Blog</button>
  <button onclick="showTab('cv',this)">CV</button>
  <button onclick="showTab('contact',this)">Contact</button>
</nav>

<div class="panel active" id="tab-scripts">
  <div class="label">Theatre Plays</div>
  <div id="plays-list"></div>
  <div class="label" style="margin-top:37px;">Screenwriting</div>
  <div id="screenwriting-list"></div>
</div>

<div class="panel" id="tab-projects">
  <div class="proj-nav" id="proj-nav">
    <button class="active" onclick="showProj('zine',this)">Zine</button>
    <button onclick="showProj('memoir',this)">Memoir</button>
    <button onclick="showProj('hatbox',this)">Sondheim's <em>Hat Box</em></button>
    <button onclick="showProj('typewriting',this)">Typewriting</button>
    <button onclick="showProj('wall',this)">Wall / 墙</button>
  </div>
  <div class="proj-panel active" id="proj-zine"><div id="zines-list"></div></div>
  <div class="proj-panel" id="proj-memoir"><div id="memoir-text" class="proj-big-desc"></div></div>
  <div class="proj-panel" id="proj-hatbox">
    <div id="hatbox-text" class="proj-big-desc"></div>
    <a id="hatbox-pdf" href="#" class="download-link" style="display:none;">Download PDF ↓</a>
  </div>
  <div class="proj-panel" id="proj-typewriting">
    <div id="typewriting-text" class="proj-big-desc"></div>
    <div id="typewriting-list"></div>
  </div>
  <div class="proj-panel" id="proj-wall">
    <div id="wall-text" class="proj-big-desc"></div>
    <div id="wall-list"></div>
  </div>
</div>

<div class="panel" id="tab-blog">
  <div id="blog-list"></div>
</div>

<div class="panel" id="tab-cv">
  <iframe class="cv-preview" id="cv-frame" src="" title="CV"></iframe>
  <a href="#" class="download-link" id="cv-download" style="display:none;">Download CV (PDF) ↓</a>
</div>

<div class="panel" id="tab-contact">
  <div class="contact-block">
    <div class="contact-label">Email</div>
    <a id="contact-email" href="#" class="contact-link"></a>
  </div>
  <div class="contact-block">
    <div class="contact-label">Address</div>
    <div id="contact-address" class="contact-value"></div>
  </div>
  <div class="contact-block">
    <div class="contact-label">Instagram</div>
    <a id="contact-instagram" href="#" class="contact-link"></a>
  </div>
</div>

<script>
  function parseMd(text) {
    const lines = text.split('\n');
    const data = {};
    let dashes = 0;
    let bodyStart = 0;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].trim() === '---') {
        dashes++;
        if (dashes === 2) { bodyStart = i + 1; break; }
        continue;
      }
      if (dashes === 1) {
        const m = lines[i].match(/^([\w_]+):\s*"?(.+?)"?\s*$/);
        if (m) data[m[1]] = m[2];
      }
    }
    data._body = lines.slice(bodyStart).join('\n').trim();
    return data;
  }

  async function fetchMd(path) {
    try {
      const res = await fetch(path);
      if (!res.ok) return null;
      return parseMd(await res.text());
    } catch { return null; }
  }

  async function fetchDir(folder) {
    try {
      const res = await fetch(`https://api.github.com/repos/yuankunzhou/yuankun-zhou/contents/${folder}`);
      if (!res.ok) return [];
      const files = await res.json();
      const results = [];
      for (const f of files) {
        if (f.name.endsWith('.md')) {
          const r = await fetch(f.download_url);
          if (r.ok) results.push(parseMd(await r.text()));
        }
      }
      return results;
    } catch { return []; }
  }

  async function loadAbout() {
    const d = await fetchMd('/_data/about.md');
    if (!d) return;
    if (d.name_en) document.querySelector('h1').childNodes[0].textContent = d.name_en + ' ';
    if (d.name_zh) document.querySelector('.zh').textContent = d.name_zh;
    if (d.roles) document.querySelector('.roles').textContent = d.roles;
    if (d.profile_pic) document.getElementById('profile-img').src = d.profile_pic;
    if (d._body) document.querySelector('.about-text').textContent = d._body;
  }

  async function loadScripts() {
    const plays = await fetchDir('_plays');
    plays.sort((a,b) => (b.year||'').localeCompare(a.year||''));
    document.getElementById('plays-list').innerHTML = plays.map(p => `
      <div class="entry">
        <div class="entry-meta">${p.type||''}${p.type&&p.year?' · ':''}${p.year||''}</div>
        <div class="entry-title">${p.title||''}</div>
        ${p.keywords?`<div class="entry-meta">${p.keywords}</div>`:''}
        <div class="entry-desc">${p.description||''}</div>
      </div>`).join('');

    const scripts = await fetchDir('_screenwriting');
    scripts.sort((a,b) => (b.year||'').localeCompare(a.year||''));
    document.getElementById('screenwriting-list').innerHTML = scripts.map(p => `
      <div class="entry">
        <div class="entry-meta">${p.type||''}${p.type&&p.year?' · ':''}${p.year||''}</div>
        <div class="entry-title">${p.title||''}</div>
        ${p.keywords?`<div class="entry-meta">${p.keywords}</div>`:''}
        <div class="entry-desc">${p.description||''}</div>
      </div>`).join('');
  }

  async function loadZines() {
    const zines = await fetchDir('_zines');
    zines.sort((a,b) => (b.year||'').localeCompare(a.year||''));
    document.getElementById('zines-list').innerHTML = zines.map(z => `
      <div class="proj-entry">
        <div class="proj-year">${z.year||''}</div>
        <div class="proj-title">${z.title||''}</div>
        <div class="proj-images">
          ${z.image1?`<img class="proj-image" src="${z.image1}" alt="" />`:'<div class="proj-image"></div>'}
          ${z.image2?`<img class="proj-image" src="${z.image2}" alt="" />`:'<div class="proj-image"></div>'}
        </div>
        <div class="proj-desc">${z.description||''}</div>
        ${z.pdf?`<a href="${z.pdf}" class="download-link">Download PDF ↓</a>`:''}
      </div>`).join('');
  }

  async function loadStaticProjects() {
    const memoir = await fetchMd('/_data/memoir.md');
    if (memoir&&memoir._body) document.getElementById('memoir-text').textContent = memoir._body;

    const hatbox = await fetchMd('/_data/hatbox.md');
    if (hatbox) {
      if (hatbox._body) document.getElementById('hatbox-text').textContent = hatbox._body;
      if (hatbox.pdf) { const el = document.getElementById('hatbox-pdf'); el.href = hatbox.pdf; el.style.display = 'inline'; }
    }

    const typewriting = await fetchMd('/_data/typewriting.md');
    if (typewriting&&typewriting._body) document.getElementById('typewriting-text').textContent = typewriting._body;

    const wall = await fetchMd('/_data/wall.md');
    if (wall&&wall._body) document.getElementById('wall-text').textContent = wall._body;
  }

  async function loadTypewriting() {
    const entries = await fetchDir('_typewriting');
    entries.sort((a,b) => (b.year||'').localeCompare(a.year||''));
    document.getElementById('typewriting-list').innerHTML = entries.map(e => `
      <div class="proj-entry">
        <div class="proj-year">${e.year||''}</div>
        <div class="proj-title">${e.title||''}</div>
        ${e.image?`<img class="proj-image-single" src="${e.image}" alt="" />`:'<div class="proj-image-single"></div>'}
        <div class="proj-desc">${e.description||''}</div>
      </div>`).join('');
  }

  async function loadWall() {
    const entries = await fetchDir('_wall');
    entries.sort((a,b) => (b.year||'').localeCompare(a.year||''));
    document.getElementById('wall-list').innerHTML = entries.map(e => `
      <div class="proj-entry">
        <div class="wall-meta">${e.location||''}${e.location&&e.year?' · ':''}${e.year||''}</div>
        ${e.image?`<img class="proj-image-single" src="${e.image}" alt="" />`:'<div class="proj-image-single"></div>'}
        <div class="proj-desc">${e.description||''}</div>
      </div>`).join('');
  }

  async function loadBlog() {
    const posts = await fetchDir('_blog');
    posts.sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const byYear = {};
    for (const p of posts) {
      const year = (p.date||'').split(' ').pop() || 'Unknown';
      if (!byYear[year]) byYear[year] = [];
      byYear[year].push(p);
    }
    const years = Object.keys(byYear).sort((a,b) => b-a);
    document.getElementById('blog-list').innerHTML = years.map(year => `
      <div class="label">${year}</div>
      ${byYear[year].map(p => `
        <div class="blog-entry">
          <div class="blog-header">
            <div class="blog-title">${p.title||''}</div>
            <div class="blog-date">${(p.date||'').split(' ').slice(0,2).join(' ')}</div>
          </div>
          <div class="blog-content">${p._body||''}</div>
        </div>`).join('')}`).join('');
  }

  async function loadCV() {
    const d = await fetchMd('/_data/cv.md');
    if (d&&d.cv_pdf) {
      document.getElementById('cv-frame').src = d.cv_pdf;
      const dl = document.getElementById('cv-download');
      dl.href = d.cv_pdf;
      dl.style.display = 'inline';
    }
  }

  async function loadContact() {
    const d = await fetchMd('/_data/contact.md');
    if (!d) return;
    if (d.email) { const el = document.getElementById('contact-email'); el.href = 'mailto:'+d.email; el.textContent = d.email; }
    if (d.address) document.getElementById('contact-address').textContent = d.address;
    if (d.instagram) { const el = document.getElementById('contact-instagram'); el.href = 'https://instagram.com/'+d.instagram.replace('@',''); el.textContent = d.instagram.startsWith('@')?d.instagram:'@'+d.instagram; }
  }

  loadAbout(); loadScripts(); loadZines(); loadStaticProjects();
  loadTypewriting(); loadWall(); loadBlog(); loadCV(); loadContact();

  function showTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }
  function showProj(name, btn) {
    document.querySelectorAll('.proj-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.proj-nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('proj-' + name).classList.add('active');
    btn.classList.add('active');
  }
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
      }
    });
  }
</script>
</body>
</html>
