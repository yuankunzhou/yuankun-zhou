backend:
  name: github
  repo: yuankunzhou/yuankun-zhou
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "About & Settings"
    files:
      - label: "About"
        name: "about"
        file: "_data/about.md"
        fields:
          - { label: "Name (English)", name: "name_en", widget: "string" }
          - { label: "Name (Chinese)", name: "name_zh", widget: "string" }
          - { label: "Roles / Tags", name: "roles", widget: "string" }
          - { label: "Profile Picture", name: "profile_pic", widget: "image", required: false }
          - { label: "About Description", name: "body", widget: "markdown" }
      - label: "CV PDF"
        name: "cv"
        file: "_data/cv.md"
        fields:
          - { label: "CV PDF", name: "cv_pdf", widget: "file", required: false }

  - name: "plays"
    label: "Theatre Plays"
    folder: "_plays"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Type", name: "type", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Keywords", name: "keywords", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }

  - name: "screenwriting"
    label: "Screenwriting"
    folder: "_screenwriting"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Type", name: "type", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Keywords", name: "keywords", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }

  - name: "zines"
    label: "Zines"
    folder: "_zines"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Image 1", name: "image1", widget: "image", required: false }
      - { label: "Image 2", name: "image2", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "PDF Download", name: "pdf", widget: "file", required: false }

  - name: "projects_static"
    label: "Projects (Memoir, Hat Box, Typewriting, Wall)"
    files:
      - label: "Memoir"
        name: "memoir"
        file: "_data/memoir.md"
        fields:
          - { label: "Description", name: "body", widget: "markdown" }
      - label: "Sondheim's Hat Box"
        name: "hatbox"
        file: "_data/hatbox.md"
        fields:
          - { label: "Description", name: "body", widget: "markdown" }
          - { label: "PDF Download", name: "pdf", widget: "file", required: false }
      - label: "Typewriting — Overview"
        name: "typewriting"
        file: "_data/typewriting.md"
        fields:
          - { label: "Description", name: "body", widget: "markdown" }
      - label: "Wall / 墙 — Overview"
        name: "wall"
        file: "_data/wall.md"
        fields:
          - { label: "Description", name: "body", widget: "markdown" }

  - name: "typewriting_entries"
    label: "Typewriting — Entries"
    folder: "_typewriting"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }

  - name: "wall_entries"
    label: "Wall / 墙 — Entries"
    folder: "_wall"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }

  - name: "blog"
    label: "Blog"
    folder: "_blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "DD MMM YYYY" }
      - { label: "Content", name: "body", widget: "markdown" }
